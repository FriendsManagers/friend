<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>المجموعات | Friends</title>
    <link rel="stylesheet" href="css/variables.css">

<body style="background:var(--bg-main); color:var(--text-primary); padding:20px;">

        <button class="base-btn" style="width:100%;" onclick="window.location.href='home.html'">العودة للرئيسية</button>
