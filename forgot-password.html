<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | Friends</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-wrapper" style="max-width:460px; margin:auto;">
        <div class="login-card" style="width:100%;">
            <h2 class="card-title">نسيت كلمة المرور؟</h2>
            <p class="card-subtitle">أدخل بريدك الإلكتروني لإرسال رابط إعادة التعيين فوراً لايف.</p>
            <form id="reset-password-form" onsubmit="return false;">
                <div class="input-wrapper">
                    <label class="field-label">البريد الإلكتروني</label>
                    <input type="email" id="reset-email" class="base-input" required placeholder="fares@friends.com" style="direction: ltr; text-align: left;">
                </div>
                <button type="submit" id="btn-reset" class="base-btn btn-accent" style="width:100%; height:46px;">إرسال رابط التعيين ✉️</button>
            </form>
            <div class="auth-navigation-links">
                <p><a href="index.html" class="highlight-link">العودة لتسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
          apiKey: "AIzaSyA5SS93zdj5N8oBMmjPgWvfSohdSBIRQ8c",
          authDomain: "friends7777.firebaseapp.com",
          projectId: "friends7777"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("reset-password-form").onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("reset-email").value.trim();
            const btn = document.getElementById("btn-reset");
            btn.innerText = "جاري الإرسال...";
            try {
                await sendPasswordResetEmail(auth, email);
                alert("تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني بنجاح! 🚀");
                window.location.href = "index.html";
            } catch(err) {
                alert("حدث خطأ: تأكد من صحة البريد الإلكتروني المكتوب.");
                btn.innerText = "إرسال رابط التعيين ✉️";
            }
        };
    </script>
</body>
</html>
