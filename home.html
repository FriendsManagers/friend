<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | Friends</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css">
    <style>
        /* ستايل وتوسيع التايملاين وخانة النشر الفخمة للاب توب */
        .timeline-layout-grid { 
            max-width: 740px; 
            margin: 85px auto 20px auto; 
            padding: 0 15px; 
            box-sizing: border-box; 
        }
        .publish-content-card {
            width: 100% !important;
            box-sizing: border-box;
            padding: 20px !important;
        }
        #timeline-post-textarea {
            width: 100%;
            min-height: 100px;
            font-size: 16px;
            resize: vertical;
        }
        
        .desktop-sidebar { display: none !important; }
        .header-menu-toggle { display: flex !important; background: none; border: none; font-size: 24px; color: var(--text-primary); cursor: pointer; align-items: center; justify-content: center; }
        
        /* قايمة الموبايل والكمبيوتر الموحدة */
        .mobile-drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 2000; display: none; opacity: 0; transition: opacity 0.3s; }
        .mobile-drawer-overlay.active { display: block; opacity: 1; }
        .mobile-drawer-content { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--bg-surface); border-left: 1px solid var(--border-color); box-shadow: var(--shadow-lg); z-index: 2001; padding: 20px; box-sizing: border-box; transition: right 0.3s ease; }
        .mobile-drawer-content.active { right: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        
        .sidebar-menu-list { display: flex; flex-direction: column; gap: 8px; padding: 0; margin: 0; list-style: none; }
        .sidebar-menu-item a { display: flex; align-items: center; gap: 10px; padding: 12px; color: var(--text-primary); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: var(--radius-sm); transition: background 0.2s; }
        .sidebar-menu-item a:hover { background: var(--bg-main); color: var(--accent-color); }

        /* أنيميشن زر الحفظ عند الضغط */
        .save-active-animation { animation: popScale 0.4s ease-in-out; display: inline-block; }
        @keyframes popScale {
            0% { transform: scale(1); }
            50% { transform: scale(1.4) rotate(-10deg); }
            100% { transform: scale(1); }
        }

        /* ستايل خانة البحث المتطورة */
        .search-container-box { width: 100%; margin-bottom: 20px; position: relative; }
        .search-input-field { width: 100%; height: 44px; padding: 0 40px 0 15px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-surface); color: var(--text-primary); font-size: 14px; box-sizing: border-box; outline: none; }
        .search-icon-inside { position: absolute; right: 15px; top: 12px; color: var(--text-secondary); font-size: 16px; }
    </style>
</head>
<body class="animate-fade-in-up">

    <div id="app-toast" class="custom-toast">
        <div class="toast-icon-wrapper"><span class="toast-icon">✨</span></div>
        <div class="toast-message-text">جاري المعالجة...</div>
    </div>

    <div id="mobile-overlay" class="mobile-drawer-overlay"></div>
    <div id="mobile-drawer" class="mobile-drawer-content">
        <div class="drawer-header">
            <h3 style="margin:0; font-size:18px; color:var(--accent-color);">🧭 تصفح الأقسام</h3>
            <button id="close-menu-trigger" style="background:none; border:none; font-size:20px; color:var(--text-primary); cursor:pointer;">✕</button>
        </div>
        <ul class="sidebar-menu-list">
            <li class="sidebar-menu-item"><a href="home.html">🏠 الرئيسية</a></li>
            <li class="sidebar-menu-item"><a href="friends.html">🤝 معارفي ومتابعيّ</a></li>
            <li class="sidebar-menu-item"><a href="groups.html">👥 المجموعات المشتركة</a></li>
            <li class="sidebar-menu-item"><a href="videos.html">📺 منصة الفيديوهات</a></li>
            <li class="sidebar-menu-item"><a href="saved.html">🔖 العناصر المحفوظة</a></li>
            <li class="sidebar-menu-item"><a href="profile.html#store">💼 متجري الرقمي</a></li>
        </ul>
    </div>

    <header class="main-platform-header">
        <div class="header-right-side">
            <button id="open-menu-trigger" class="header-menu-toggle">☰</button>
            <span class="platform-brand-logo">Friends</span>
            <div class="algorithm-badge">⏱️ زمني 100%</div>
        </div>
        <div class="header-left-side">
            <button class="action-circle-btn" onclick="window.location.href='notifications.html'">🔔</button>
            <button class="action-circle-btn" onclick="window.location.href='chat.html'">💬</button>
            <img src="https://www.gravatar.com/avatar/?d=mp" id="header-user-avatar" class="header-profile-avatar" onclick="window.location.href='profile.html'">
        </div>
    </header>

    <div class="timeline-layout-grid">
        <main class="timeline-content-feed" style="width: 100%;">
            
            <div class="search-container-box">
                <span class="search-icon-inside">🔍</span>
                <input type="text" id="global-search-input" class="search-input-field" placeholder="ابحث عن منشورات أو أشخاص...">
            </div>

            <section class="publish-content-card">
                <div class="publish-upper-row">
                    <img src="https://www.gravatar.com/avatar/?d=mp" id="publish-box-avatar" class="box-user-avatar">
                    <textarea id="timeline-post-textarea" placeholder="شارك أفكارك الحرة... 🚀"></textarea>
                </div>
                <div class="publish-lower-actions">
                    <div class="privacy-notice-tag">🔒 بيئة تصفح نظيفة ومحمية</div>
                    <button id="timeline-publish-submit-btn" class="base-btn btn-accent" style="padding: 8px 24px; font-weight: bold;">نشر</button>
                </div>
            </section>

            <section id="timeline-live-feed-wrapper" class="feed-stream-layout">
                <div style="text-align: center; padding: 40px; color: var(--text-secondary);">جاري الاتصال السحابي...</div>
            </section>
        </main>
    </div>

    <nav class="mobile-fixed-bottom-nav">
        <a href="home.html" class="bottom-nav-link active"><span class="nav-icon-span">🏠</span><span>الرئيسية</span></a>
        <a href="reels.html" class="bottom-nav-link"><span class="nav-icon-span">🎬</span><span>الريلز</span></a>
        <a href="chat.html" class="bottom-nav-link"><span class="nav-icon-span">💬</span><span>الرسائل</span></a>
        <a href="profile.html#store" class="bottom-nav-link"><span class="nav-icon-span">💼</span><span>متجري</span></a>
    </nav>

    <script type="module" src="js/posts.js"></script>
    <script>
        const openBtn = document.getElementById('open-menu-trigger');
        const closeBtn = document.getElementById('close-menu-trigger');
        const overlay = document.getElementById('mobile-overlay');
        const drawer = document.getElementById('mobile-drawer');
        function toggleMenu(open) {
            if(open) { overlay.classList.add('active'); drawer.classList.add('active'); }
            else { overlay.classList.remove('active'); drawer.classList.remove('active'); }
        }
        if(openBtn && closeBtn && overlay && drawer) {
            openBtn.onclick = () => toggleMenu(true);
            closeBtn.onclick = () => toggleMenu(false);
            overlay.onclick = () => toggleMenu(false);
        }
    </script>
</body>
</html>
