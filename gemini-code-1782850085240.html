<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | Friends لايف</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/login.css"> </head>
<body class="animate-fade-in-up">

    <div id="app-toast" class="custom-toast">
        <div class="toast-icon-wrapper" style="background: var(--verified-light);">
            <span class="toast-icon">✨</span>
        </div>
        <div class="toast-message-text class-toast-msg">جاري معالجة طلبك...</div>
    </div>

    <div class="login-wrapper">
        <div class="login-branding">
            <h1 class="platform-logo">Friends</h1>
            <p class="platform-slogan">احصل على حسابك الموثق مجاناً بناءً على جدارتك الحقيقية، واعرض خدماتك ومنتجاتك في متجرك الخاص بعمولة 0%.</p>
        </div>

        <div class="login-card hover-lift">
            <h2 class="card-title">انضم إلينا اليوم</h2>
            <p class="card-subtitle">أنشئ حسابك الآن لتجربة تواصل اجتماعي نظيفة ومريحة.</p>

            <form id="register-core-form" onsubmit="return false;">
                <div class="input-wrapper">
                    <label class="field-label">الاسم الكامل</label>
                    <input type="text" id="auth-name" class="base-input" required placeholder="فارس أبو الخير">
                </div>

                <div class="input-wrapper">
                    <label class="field-label">البريد الإلكتروني</label>
                    <input type="email" id="auth-email" class="base-input" required placeholder="fares@friends.com" style="direction: ltr; text-align: left;">
                </div>

                <div class="input-wrapper">
                    <label class="field-label">كلمة المرور (6 أحرف/أرقام على الأقل)</label>
                    <input type="password" id="auth-password" class="base-input" required placeholder="••••••••" style="direction: ltr; text-align: left;">
                </div>

                <button type="submit" id="auth-submit-btn" class="base-btn btn-accent btn-pulse" style="width: 100%; margin-top: 12px; height: 48px; border-radius: var(--radius-md); background-color: var(--verified-color);">
                    تسجيل الحساب بنجاح
                </button>
            </form>

            <div class="auth-navigation-links">
                <p>لديك حساب بالفعل؟ <a href="login.html" class="highlight-link">سجل دخولك الآن</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
