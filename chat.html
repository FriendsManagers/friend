<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Live Chats</title>
    <link rel="stylesheet" href="./style.css">
    
    <style>
        /* ==========================================================================
           تنسيقات شاشة المحادثات المفرودة بالكامل (Ultra Clean Chats UI)
           ========================================================================== */

        .chats-app-container {
            display: flex;
            max-width: 900px;
            margin: 0 auto;
            height: calc(100vh - 125px); /* خصم مسافة الهيدر والناف السفلي */
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* قائمة الأصدقاء الجانبية */
        .chat-sidebar {
            width: 35%;
            border-inline-end: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: var(--bg-surface);
        }

        .sidebar-header {
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            border-bottom: 1px solid var(--border-color);
        }

        .friends-list-chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .friend-chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(0, 0, 0, 0.02);
        }

        .friend-chat-item:hover, 
        .friend-chat-item.active {
            background-color: var(--bg-main);
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background-color: var(--success-color);
            border-radius: 50%;
            margin-inline-start: auto;
        }

        /* نافذة غرفة المحادثة المفتوحة */
        .chat-main-window {
            width: 65%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
        }

        .chat-window-header {
            padding: 14px 16px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-messages-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* فقاعات الرسائل (المرسل والمستقبل) */
        .msg-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 13.5px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-bubble.incoming {
            background-color: var(--bg-surface);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-inline-start-radius: 4px;
        }

        .msg-bubble.outgoing {
            background-color: var(--accent-color);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-inline-end-radius: 4px;
        }

        /* صندوق إدخال الرسالة السفلي */
        .chat-window-footer {
            padding: 12px 16px;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-window-footer input {
            flex: 1;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        /* استجابة الموبايل: تحويل الشات لملء الشاشة */
        @media (max-width: 680px) {
            .chat-sidebar { 
                width: 100%; 
            }
            .chat-main-window { 
                display: none; 
            }
            .chats-app-container.open-room .chat-sidebar { 
                display: none; 
            }
            .chats-app-container.open-room .chat-main-window { 
                display: flex; 
                width: 100%; 
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="./index.html" class="app-logo">Friends</a>
        <div class="header-left">
            <a href="./index.html" class="circle-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">🏠</a>
        </div>
    </header>

    <main class="app-container" style="max-width: 950px; padding: 8px;">
        <div class="chats-app-container" id="chats-layout-wrapper">
            
            <aside class="chat-sidebar">
                <div class="sidebar-header">Direct Messages</div>
                <div class="friends-list-chat" id="chats-users-list">
                    
                    <div class="friend-chat-item active" onclick="document.getElementById('chats-layout-wrapper').classList.add('open-room')">
                        <img src="https://www.gravatar.com/avatar/?d=mp" alt="Avatar" class="user-avatar" style="width: 38px; height: 38px;">
                        <div>
                            <div style="font-size: 13.5px; font-weight: 700;">Omar Ali</div>
                            <div style="font-size: 11px; color: var(--text-secondary);">Active now</div>
                        </div>
                        <div class="online-dot"></div>
                    </div>

                </div>
            </aside>

            <section class="chat-main-window">
                
                <div class="chat-window-header">
                    <button class="circle-btn" style="display: none;" id="back-to-sidebar-btn" onclick="document.getElementById('chats-layout-wrapper').classList.remove('open-room')">⬅️</button>
                    <img src="https://www.gravatar.com/avatar/?d=mp" alt="Avatar" class="user-avatar" style="width: 34px; height: 34px;" id="active-chat-avatar">
                    <h4 id="active-chat-username" style="font-size: 14px; font-weight: 700;">Omar Ali</h4>
                </div>

                <div class="chat-messages-body" id="chat-messages-container">
                    <div class="msg-bubble incoming">
                        Hey! Have you seen the new update for the Friends app?
                    </div>
                    <div class="msg-bubble outgoing">
                        Yes! It looks absolutely stunning and ultra-clean.
                    </div>
                </div>

                <div class="chat-window-footer">
                    <input type="text" id="chat-message-input" placeholder="Type a message...">
                    <button class="btn-primary" id="send-direct-msg-btn" style="padding: 10px 20px;">Send</button>
                </div>
            </section>

        </div>
    </main>

    <nav class="bottom-nav">
        <a href="./index.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="./chats.html" class="nav-item active"><span>💬</span>Chats</a>
        <a href="./profile.html" class="nav-item"><span>👤</span>Profile</a>
    </nav>

    <script type="module" src="./app.js"></script>
    <script>
        // تفعيل زر الرجوع للموبايل
        if (window.innerWidth <= 680) {
            document.getElementById("back-to-sidebar-btn").style.display = "block";
        }
    </script>
</body>
</html>
