<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Profile & Settings</title>
    <!-- ربط ملف الستايل الموحد للمنصة -->
    <link rel="stylesheet" href="./style.css">
    
    <style>
        /* ==========================================================================
           تنسيقات الملف الشخصي المفرودة بالكامل (Ultra Clean Profile CSS)
           ========================================================================== */
        
        .profile-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-header-card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
        }

        .cover-photo {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, var(--accent-color), #6366f1);
            object-fit: cover;
        }

        .profile-avatar-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            padding: 0 16px 20px 16px;
            text-align: center;
        }

        .big-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--bg-surface);
            object-fit: cover;
            background-color: var(--bg-main);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .user-profile-name {
            font-size: 20px;
            font-weight: 800;
            margin-top: 10px;
            color: var(--text-primary);
        }

        .user-bio {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
            max-width: 80%;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 16px;
            width: 100%;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .stat-box {
            text-align: center;
            cursor: pointer;
        }

        .stat-box .number {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stat-box .label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 16px;
        }

        .btn-secondary {
            flex: 1;
            background-color: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        .user-posts-heading {
            font-size: 15px;
            font-weight: 700;
            padding: 0 4px;
            color: var(--text-primary);
        }

        /* ==========================================================================
           نافذة الإعدادات المنبثقة الفخمة (Modal Settings)
           ========================================================================== */
        
        .settings-modal {
            position: fixed;
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2500;
            padding: 16px;
        }

        .settings-modal.open {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 450px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .close-modal {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .setting-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .setting-group input, 
        .setting-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }

        .privacy-toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            margin: 16px 0;
        }

        .avatar-edit-options {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <!-- الهيدر العلوي بنظام المسار الصحيح جيت هاب -->
    <header class="main-header">
        <a href="./index.html" class="app-logo">Friends</a>
        <div class="header-left">
            <a href="./index.html" class="circle-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">🏠</a>
        </div>
    </header>

    <!-- الحاوية المخصصة للملف الشخصي -->
    <main class="profile-container">
        <section class="profile-header-card">
            <div class="cover-photo-wrapper">
                <div class="cover-photo"></div>
            </div>
            
            <div class="profile-avatar-area">
                <img src="https://www.gravatar.com/avatar/?d=mp" alt="User Avatar" class="big-avatar" id="profile-page-avatar">
                <h2 class="user-profile-name" id="profile-page-name">Loading...</h2>
                <p class="user-bio" id="profile-page-bio">No bio available yet.</p>
                
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="number" id="posts-count">0</div>
                        <div class="label">Posts</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="followers-count">0</div>
                        <div class="label">Followers</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="following-count">0</div>
                        <div class="label">Following</div>
                    </div>
                </div>
                
                <div class="profile-actions">
                    <button class="btn-primary" style="flex: 2;" id="edit-profile-trigger-btn">Edit Profile</button>
                    <button class="btn-secondary" id="logout-btn">Logout</button>
                </div>
            </div>
        </section>

        <div class="user-posts-heading">My Moments</div>
        <section id="user-own-posts-feed">
            <div class="shimmer-card">
                <div class="shimmer-line line-short"></div>
                <div class="shimmer-line line-long"></div>
            </div>
        </section>
    </main>

    <!-- واجهة الإعدادات المتقدمة (الحساب العام/الخاص وحذف الصورة) -->
    <div class="settings-modal" id="profile-settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Account Settings</h3>
                <span class="close-modal" id="close-settings-modal">&times;</span>
            </div>
            
            <label style="font-size: 13px; font-weight: 600; color: var(--text-secondary); display:block; margin-bottom:8px;">Profile Photo</label>
            <div class="avatar-edit-options">
                <label class="btn-primary" style="font-size:12px; cursor:pointer; text-align:center; flex:1;">
                    📷 Change Photo
                    <input type="file" id="profile-avatar-upload" accept="image/*" style="display: none;">
                </label>
                <button class="btn-secondary" style="margin:0;" id="delete-avatar-btn">🗑️ Remove</button>
            </div>
            
            <div class="setting-group">
                <label for="edit-username">Username</label>
                <input type="text" id="edit-username">
            </div>
            
            <div class="setting-group">
                <label for="edit-bio">Bio</label>
                <textarea id="edit-bio" rows="3"></textarea>
            </div>
            
            <div class="privacy-toggle-row">
                <div>
                    <div style="font-size: 14px; font-weight: 700;">Private Account</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">Only approved followers can see your posts</div>
                </div>
                <input type="checkbox" id="privacy-toggle-switch" style="width: 20px; height: 20px; cursor: pointer;">
            </div>
            
            <button class="btn-primary" style="width: 100%; padding: 12px;" id="save-profile-settings-btn">Save Changes</button>
        </div>
    </div>

    <div class="toast" id="app-toast">
        <span class="toast-icon">✨</span>
        <span class="toast-text-message">Done</span>
    </div>

    <!-- شريط التنقل السفلي -->
    <nav class="bottom-nav">
        <a href="./index.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="./chats.html" class="nav-item"><span>💬</span>Chats</a>
        <a href="./profile.html" class="nav-item active"><span>👤</span>Profile</a>
    </nav>

    <!-- تشغيل المحرك المطور بالربط الصحيح لجيت هاب -->
    <script type="module" src="./app.js"></script>
    <script>
        const modal = document.getElementById("profile-settings-modal");
        document.getElementById("edit-profile-trigger-btn")?.addEventListener("click", () => {
            document.getElementById("edit-username").value = document.getElementById("profile-page-name").innerText;
            document.getElementById("edit-bio").value = document.getElementById("profile-page-bio").innerText;
            modal.classList.add("open");
        });
        document.getElementById("close-settings-modal")?.addEventListener("click", () => modal.classList.remove("open"));
    </script>
</body>
</html>
