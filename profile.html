<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الملف الشخصي | Friends</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيقات الملف الشخصي المتقدمة Clean UI */
        .profile-header-card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 24px;
            text-align: center;
            position: relative;
        }

        .profile-cover-placeholder {
            height: 140px;
            background: linear-gradient(135deg, var(--accent-color), #00cdd6);
            border-radius: var(--radius-md);
            margin-bottom: -60px;
            background-size: cover;
            background-position: center;
        }

        .profile-avatar-large {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--bg-surface);
            object-fit: cover;
            position: relative;
            background-color: var(--bg-surface);
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
        }

        .profile-info-box {
            margin-top: 12px;
        }

        .verified-badge {
            color: var(--accent-color);
            font-size: 18px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 4px;
        }

        .profile-bio {
            font-size: 13.5px;
            color: var(--text-secondary);
            margin-top: 8px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .social-links-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }
        .social-icon {
            text-decoration: none;
            font-size: 14px;
            color: var(--accent-color);
            background-color: var(--bg-main);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .profile-stats-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-count { font-size: 18px; font-weight: 800; color: var(--text-primary); }
        .stat-label { font-size: 12px; color: var(--text-secondary); }

        .profile-actions-zone {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .settings-card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-top: 16px;
        }
        .settings-card h3 { font-size: 15px; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            outline: none;
            font-size: 13.5px;
        }
        .form-group textarea { resize: none; height: 65px; }

        .user-posts-heading {
            font-size: 15px;
            font-weight: 700;
            margin: 20px 0 10px 0;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-right">
            <a href="index.html" class="app-logo">Friends</a>
        </div>
        <div class="header-left">
            <button id="logout-btn" class="circle-btn" title="تسجيل الخروج">🚪</button>
        </div>
    </header>

    <main class="app-container">
        
        <div class="profile-header-card">
            <div id="profile-cover" class="profile-cover-placeholder"></div>
            <img class="profile-avatar-large" id="profile-display-avatar" src="https://www.instagram.com/static/images/anonymousUser.jpg/73e970b629f6.jpg" alt="المستخدم">
            
            <div class="profile-info-box">
                <h2 id="profile-display-name">جاري التحميل...</h2>
                <p class="profile-bio" id="profile-display-bio">جاري مزامنة النبذة التعريفية من قاعدة البيانات الحية...</p>
                
                <div class="social-links-row" id="profile-social-box"></div>
            </div>

            <div class="profile-actions-zone" id="profile-actions-mount"></div>

            <div class="profile-stats-row">
                <div class="stat-item">
                    <span class="stat-count" id="stat-posts-count">0</span>
                    <span class="stat-label">منشور</span>
                </div>
                <div class="stat-item">
                    <span class="stat-count" id="stat-followers-count">0</span>
                    <span class="stat-label">متابع</span>
                </div>
                <div class="stat-item">
                    <span class="stat-count" id="stat-following-count">0</span>
                    <span class="stat-label">يتابع</span>
                </div>
            </div>
        </div>

        <div class="settings-card" id="my-settings-pane" style="display: none;">
            <h3>⚙️ تعديل بيانات الحساب الشخصي</h3>
            
            <div class="form-group">
                <label for="edit-name">الاسم المعروض:</label>
                <input type="text" id="edit-name">
            </div>

            <div class="form-group">
                <label for="edit-bio">النبذة التعريفية (Bio):</label>
                <textarea id="edit-bio"></textarea>
            </div>

            <div class="form-group">
                <label for="edit-github">رابط حساب GitHub (اختياري):</label>
                <input type="url" id="edit-github" placeholder="https://github.com/...">
            </div>

            <button id="save-profile-changes-btn" class="btn-primary" style="width: 100%; padding: 12px;">حفظ وتحديث البيانات في السحابة</button>
        </div>

        <h3 class="user-posts-heading" id="posts-block-title">المنشورات</h3>
        <section id="app-timeline-feed">
            <div class="shimmer-card">
                <div class="shimmer-line line-short"></div>
                <div class="shimmer-line line-long"></div>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><p>الرئيسية</p></a>
        <a href="index.html?action=explore" class="nav-item"><span>🔍</span><p>الاستكشاف</p></a>
        <a href="chat.html" class="nav-item"><span>💬</span><p>الرسائل</p></a>
        <a href="profile.html" class="nav-item active"><span>👤</span><p>الملف</p></a>
    </nav>

    <script type="module">
        // ربط أحداث تعديل الحساب بالمحرك الرئيسي
        document.getElementById('save-profile-changes-btn').addEventListener('click', () => {
            if(window.updateProfileCloudData) {
                const name = document.getElementById('edit-name').value.trim();
                const bio = document.getElementById('edit-bio').value.trim();
                const github = document.getElementById('edit-github').value.trim();
                window.updateProfileCloudData(name, bio, github);
            }
        });
    </script>
</body>
</html>
