<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ستايل مخصص ومميز لعناصر البروفايل الفريدة */
        .profile-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .profile-header-card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
        }
        .cover-photo {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, var(--accent-color), #6366f1);
            object-fit: cover;
        }
        .profile-avatar-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            padding: 0 16px 20px 16px;
            text-align: center;
        }
        .big-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--bg-surface);
            object-fit: cover;
            background-color: var(--bg-main);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .user-profile-name {
            font-size: 20px;
            font-weight: 800;
            margin-top: 10px;
            color: var(--text-primary);
        }
        .user-bio {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
            max-width: 80%;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 16px;
            width: 100%;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .stat-box {
            text-align: center;
            cursor: pointer;
        }
        .stat-box .number {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-primary);
        }
        .stat-box .label {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .profile-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 16px;
        }
        .btn-secondary {
            flex: 1;
            background-color: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-secondary:hover { background-color: var(--border-color); }
        
        .user-posts-heading {
            font-size: 15px;
            font-weight: 700;
            padding: 0 4px;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="app-logo">Friends</a>
        <div class="header-left">
            <button class="circle-btn" onclick="location.href='index.html'">🏠</button>
        </div>
    </header>

    <main class="profile-container">
        
        <section class="profile-header-card">
            <div class="cover-photo-wrapper">
                <div class="cover-photo"></div>
            </div>
            
            <div class="profile-avatar-area">
                <img src="https://www.gravatar.com/avatar/?d=mp" alt="User Avatar" class="big-avatar" id="profile-page-avatar">
                <h2 class="user-profile-name" id="profile-page-name">Loading...</h2>
                <p class="user-bio" id="profile-page-bio">No bio available yet.</p>
                
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="number" id="posts-count">0</div>
                        <div class="label">Posts</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="followers-count">0</div>
                        <div class="label">Followers</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="following-count">0</div>
                        <div class="label">Following</div>
                    </div>
                </div>

                <div class="profile-actions">
                    <button class="btn-primary" style="flex: 2;" id="edit-profile-trigger-btn">Edit Profile</button>
                    <button class="btn-secondary" id="logout-btn">Logout</button>
                </div>
            </div>
        </section>

        <div class="user-posts-heading">My Moments</div>
        <section id="user-own-posts-feed">
            <div class="shimmer-card">
                <div class="shimmer-line line-short"></div>
                <div class="shimmer-line line-long"></div>
            </div>
        </section>

    </main>

    <div class="toast" id="app-toast">
        <span class="toast-icon">✨</span>
        <span class="toast-text-message">Done</span>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span>🏠</span>Home
        </a>
        <a href="chats.html" class="nav-item">
            <span>💬</span>Chats
        </a>
        <a href="profile.html" class="nav-item active">
            <span>👤</span>Profile
        </a>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
