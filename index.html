<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Friends | تسجيل الدخول والمنصة</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* شاشة الحسابات الاحترافية - تغطي كامل الموقع إذا لم يسجل المستخدم */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-main);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.05);
            text-align: center;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .auth-tab {
            flex: 1;
            padding: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }
        .auth-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .auth-form input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }
        .google-btn {
            background-color: #fff;
            color: #1a1a1a;
            border: 1px solid #dadce0;
            padding: 12px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            font-size: 13.5px;
        }
    </style>
</head>
<body>

    <div id="auth-screen-overlay" class="auth-overlay">
        <div class="auth-card">
            <h1 style="color: var(--accent-color); font-weight: 800; margin-bottom: 4px;">Friends</h1>
            <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 20px;">مرحباً بك في شبكتك الاجتماعية الحديثة</p>
            
            <div class="auth-tabs">
                <div id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">تسجيل الدخول</div>
                <div id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">إنشاء حساب</div>
            </div>

            <form id="login-form" class="auth-form" onsubmit="handleEmailAuth(event, 'login')">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="login-password" placeholder="كلمة المرور" required>
                <span style="font-size: 11px; color: var(--text-secondary); text-align: right; cursor: pointer;" onclick="handleResetPassword()">نسيت كلمة المرور؟</span>
                <button type="submit" class="btn-primary" style="padding: 12px;">دخول الحساب</button>
            </form>

            <form id="register-form" class="auth-form" style="display: none;" onsubmit="handleEmailAuth(event, 'register')">
                <input type="text" id="reg-name" placeholder="الاسم الكامل" required>
                <input type="email" id="reg-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="reg-password" placeholder="كلمة المرور (أكثر من 6 أحرف)" required>
                <button type="submit" class="btn-primary" style="padding: 12px;">تأكيد وإنشاء الحساب</button>
            </form>

            <div style="margin: 16px 0; font-size: 11px; color: var(--text-secondary);">أو من خلال</div>
            <button id="google-login-btn" class="google-btn">
                <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google">
                التسجيل السريع بواسطة جوجل
            </button>
        </div>
    </div>

    <div id="system-toast" class="toast">
        <span id="toast-icon">🔔</span>
        <span id="toast-text">جاري التحميل...</span>
    </div>

    <header class="main-header">
        <div class="header-right">
            <a href="index.html" class="app-logo">Friends</a>
        </div>
        <div class="header-left">
            <button id="theme-toggle-btn" class="circle-btn">🌓</button>
            <img id="user-header-avatar" class="nav-avatar" src="https://www.instagram.com/static/images/anonymousUser.jpg/73e970b629f6.jpg" alt="بروفايلك" onclick="window.location.href='profile.html'">
        </div>
    </header>

    <main class="app-container">
        <section class="search-section">
            <input type="text" id="global-search-input" placeholder="🔍 ابحث عن أشخاص، منشورات، هاشتاجات...">
        </section>

        <section class="create-post-box">
            <div class="post-input-row">
                <img id="create-post-avatar" class="user-avatar" src="https://www.instagram.com/static/images/anonymousUser.jpg/73e970b629f6.jpg" alt="أنت">
                <textarea id="post-textarea" placeholder="ما الجديد في مشاريعك اليوم يا هندسة؟..."></textarea>
            </div>
            <div class="post-actions-row">
                <label for="file-upload-input" class="upload-label" style="cursor: pointer;">📷 إرفاق ميديا</label>
                <input type="file" id="file-upload-input" style="display: none;">
                <button id="publish-post-btn" class="btn-primary">نشر المنشور</button>
            </div>
        </section>

        <section id="app-timeline-feed">
            </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span>🏠</span><p>الرئيسية</p></a>
        <a href="chat.html" class="nav-item"><span>💬</span><p>الرسائل</p></a>
        <a href="profile.html" class="nav-item"><span>👤</span><p>الملف</p></a>
    </nav>

    <script>
        // التبديل السلس بين تبويبات الدخول وإنشاء الحساب
        function switchAuthTab(mode) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if(mode === 'login') {
                loginForm.style.display = 'flex'; registerForm.style.display = 'none';
                tabLogin.classList.add('active'); tabRegister.classList.remove('active');
            } else {
                loginForm.style.display = 'none'; registerForm.style.display = 'flex';
                tabLogin.classList.remove('active'); tabRegister.classList.add('active');
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
