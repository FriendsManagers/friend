<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Ultra Clean Social</title>
    <!-- ربط الستايل الموحد -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- الهيدر العلوي الزجاجي الثابت -->
    <header class="main-header">
        <a href="./index.html" class="app-logo">Friends</a>
        <div class="header-left">
            <button class="circle-btn" id="noti-btn">🔔</button>
            <a href="./profile.html" style="display:inline-block; border-radius:50%; overflow:hidden;">
                <img src="https://www.gravatar.com/avatar/?d=mp" alt="Profile" class="user-avatar" id="nav-profile-img" style="width:32px; height:32px; object-fit:cover;">
            </a>
        </div>
    </header>

    <!-- الحاوية الرئيسية للمنصة -->
    <main class="app-container">
        
        <!-- صندوق إنشاء نشر منشور جديد (Premium Publisher) -->
        <section class="publisher-card">
            <div class="publisher-body">
                <img src="https://www.gravatar.com/avatar/?d=mp" alt="User" class="user-avatar">
                <textarea id="post-textarea" placeholder="What's on your mind? Share your moments..."></textarea>
            </div>
            <div class="publisher-actions-bar">
                <button class="action-btn" onclick="window.showToast('Photo upload coming soon!', '📷')">📷 Photo</button>
                <button class="btn-primary" id="publish-post-btn">Publish</button>
            </div>
        </section>

        <!-- خلاصة المنشورات اللايف (Feed Timeline) -->
        <section id="feed-timeline-container" class="timeline-feed-grid">
            <!-- الشيمر لودينج اللطيف (Shimmer Effect) بيظهر قبل تحميل الداتا -->
            <div class="shimmer-card">
                <div class="shimmer-line line-short"></div>
                <div class="shimmer-line line-long"></div>
            </div>
            <div class="shimmer-card">
                <div class="shimmer-line line-short"></div>
                <div class="shimmer-line line-long"></div>
            </div>
        </section>

    </main>

    <!-- الـ Bottom Sheet المطور للتعليقات لايف -->
    <div class="bottom-sheet-backdrop" id="comments-backdrop"></div>
    <div class="bottom-sheet" id="comments-sheet">
        <div class="sheet-header">
            <div class="drag-handle"></div>
            <h3>Comments</h3>
            <button class="circle-btn" id="close-comments-btn">&times;</button>
        </div>
        <div class="sheet-body" id="comments-list-body">
            <!-- التعليقات هتحقن هنا بالـ JS -->
        </div>
        <div class="sheet-footer">
            <input type="text" id="new-comment-input" placeholder="Write an ultra-clean comment...">
            <button class="btn-primary" id="send-comment-btn" style="padding: 10px 20px;">Send</button>
        </div>
    </div>

    <!-- الـ Lightbox العالمي لعرض الصور المكبرة بنقاء عالي -->
    <div class="lightbox-overlay" id="global-lightbox" style="display: none;">
        <span class="close-lightbox" id="close-lightbox-btn">&times;</span>
        <img src="" alt="Enlarged Media" id="lightbox-img" class="lightbox-content">
    </div>

    <!-- التوست الإشعاري المنسق (Toast Notification) -->
    <div class="toast" id="app-toast">
        <span class="toast-icon">✨</span>
        <span class="toast-text-message">Done successfully!</span>
    </div>

    <!-- شريط التنقل السفلي الموحد والثابت -->
    <nav class="bottom-nav">
        <a href="./index.html" class="nav-item active">
            <span>🏠</span>Home
        </a>
        <a href="./chats.html" class="nav-item">
            <span>💬</span>Chats
        </a>
        <a href="./profile.html" class="nav-item">
            <span>👤</span>Profile
        </a>
    </nav>

    <!-- الربط الصحيح والمضمون لجيت هاب بيجز -->
    <script type="module" src="./app.js"></script>
</body>
</html>
