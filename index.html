<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Friends | منصتك الاجتماعية الاحترافية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="system-toast" class="toast">
        <span id="toast-icon">🔔</span>
        <span id="toast-text">جاري التحميل...</span>
    </div>

    <div id="media-lightbox" class="lightbox" style="display: none;">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="عرض كامل">
    </div>

    <header class="main-header">
        <div class="header-right">
            <a href="index.html" class="app-logo">Friends</a>
        </div>
        <div class="header-left">
            <button id="notification-badge-btn" class="circle-btn" title="الإشعارات">🔔<span id="notif-count" class="badge" style="display:none;">0</span></button>
            <button id="theme-toggle-btn" class="circle-btn" title="تبديل المظهر">🌓</button>
            <img id="user-header-avatar" class="nav-avatar" src="https://www.instagram.com/static/images/anonymousUser.jpg/73e970b629f6.jpg" alt="الملف الشخصي" onclick="navigateToProfile('me')">
        </div>
    </header>

    <main class="app-container">
        
        <section class="search-section">
            <div class="search-bar-wrapper">
                <input type="text" id="global-search-input" placeholder="🔍 ابحث عن منشورات، أشخاص، أو هاشتاجات...">
                <div id="search-results-dropdown" class="search-results-box" style="display: none;"></div>
            </div>
        </section>

        <section class="notes-wrapper">
            <div class="add-note-inline">
                <input type="text" id="note-input" maxlength="60" placeholder="ما هي ملاحظتك السريعة الآن؟ (60 حرفاً)...">
                <button id="submit-note-btn" class="btn-primary">نشر</button>
            </div>
            <div class="notes-scroller" id="notes-shelf">
                </div>
        </section>

        <section class="create-post-box">
            <div class="post-input-row">
                <img id="create-post-avatar" class="user-avatar" src="https://www.instagram.com/static/images/anonymousUser.jpg/73e970b629f6.jpg" alt="أنت">
                <textarea id="post-textarea" placeholder="ما الجديد في مشاريعك أو يومك يا هندسة؟ شاركنا أفكارك..."></textarea>
            </div>
            
            <div id="file-preview-zone" class="preview-zone" style="display: none;">
                <button id="cancel-preview-btn" class="close-preview">&times;</button>
                <div id="preview-render-mount"></div>
            </div>
            
            <div class="post-actions-row">
                <label for="file-upload-input" class="upload-label">📷 إرفاق صورة / فيديو</label>
                <input type="file" id="file-upload-input" accept="image/*,video/*" style="display: none;">
                <button id="publish-post-btn" class="btn-primary">نشر المنشور</button>
            </div>
        </section>

        <section id="suggestions-section" class="suggestions-box" style="display:none;">
            <h3>👥 أشخاص قد تعرفهم</h3>
            <div class="suggestions-list" id="suggestions-mount"></div>
        </section>

        <section id="app-timeline-feed">
            <div class="shimmer-card">
                <div class="shimmer-line line-short"></div>
                <div class="shimmer-line line-long"></div>
            </div>
        </section>

    </main>

    <div id="comments-backdrop" class="backdrop"></div>
    <div id="comments-sheet" class="bottom-sheet">
        <div class="sheet-header">
            <div class="drag-handle"></div>
            <h3 id="comments-title">التعليقات</h3>
            <span id="close-sheet-btn" class="close-sheet">&times;</span>
        </div>
        <div id="comments-list-container" class="sheet-body"></div>
        <div class="sheet-footer">
            <input type="text" id="new-comment-input" placeholder="اكتب تعليقاً محترماً...">
            <button id="send-comment-btn" class="btn-primary">إرسال</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span>🏠</span><p>الرئيسية</p></a>
        <a href="index.html?action=explore" class="nav-item"><span>🔍</span><p>الاستكشاف</p></a>
        <a href="chat.html" class="nav-item"><span>💬</span><p>الرسائل</p></a>
        <a href="profile.html" class="nav-item"><span>👤</span><p>الملف</p></a>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
