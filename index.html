@keyframes fade{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:none;

<script>

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const storage = firebase.storage();

//////////////////////////////////////////////////////
// Global Variables
//////////////////////////////////////////////////////

let currentUser =
localStorage.getItem("logged_user") || "";

let globalPostsCache = [];

let globalUsersProfileMap = {};

let globalFollowingCacheList = [];

let activeAppTabContext = "home";

let stagedFileObjectForUpload = null;

//////////////////////////////////////////////////////
// Infinite Scroll
//////////////////////////////////////////////////////

let lastVisiblePost = null;

let isLoadingMorePosts = false;

let allPostsLoaded = false;

//////////////////////////////////////////////////////
// عند فتح الموقع
//////////////////////////////////////////////////////

window.addEventListener("DOMContentLoaded", () => {

    initializeApplicationThemeContext();

    bindStaticInteractiveEventListeners();

    if(currentUser){

        document.getElementById(
        "application-auth-overlay"
        ).style.display="none";

        performApplicationDataBootstrap();

    }else{

        document.getElementById(
        "application-auth-overlay"
        ).style.display="flex";

    }

});

//////////////////////////////////////////////////////
// Theme
//////////////////////////////////////////////////////

function initializeApplicationThemeContext(){

    const savedTheme =
    localStorage.getItem("theme") || "light";

    if(savedTheme==="dark"){

        document.documentElement
        .setAttribute("data-theme","dark");

    }

}

function toggleApplicationThemeUX(){

    const theme =
    document.documentElement
    .getAttribute("data-theme");

    if(theme==="dark"){

        document.documentElement
        .removeAttribute("data-theme");

        localStorage.setItem(
        "theme",
        "light"
        );

    }else{

        document.documentElement
        .setAttribute(
        "data-theme",
        "dark"
        );

        localStorage.setItem(
        "theme",
        "dark"
        );

    }

}

//////////////////////////////////////////////////////
// Toast
//////////////////////////////////////////////////////

function displaySystemToast(
message,
type="success"
){

    const toast =
    document.getElementById(
    "system-notification-toast"
    );

    document.getElementById(
    "toast-message-holder"
    ).innerText=message;

    toast.classList.add(
    "toast-state-visible"
    );

    setTimeout(()=>{

        toast.classList.remove(
        "toast-state-visible"
        );

    },3000);

}

//////////////////////////////////////////////////////
// Relative Time
//////////////////////////////////////////////////////

function calculateRelativeTimeDuration(time){

    if(!time) return "الآن";

    let diff =
    Date.now()-time;

    let sec =
    Math.floor(diff/1000);

    if(sec<60)
    return "الآن";

    let min =
    Math.floor(sec/60);

    if(min<60)
    return min+" دقيقة";

    let hr =
    Math.floor(min/60);

    if(hr<24)
    return hr+" ساعة";

    let day =
    Math.floor(hr/24);

    return day+" يوم";

}

//////////////////////////////////////////////////////
// Profile
//////////////////////////////////////////////////////

function routeToUserProfileQuery(user){

    if(!user)return;

    window.location.href=
    "profile.html?user="+
    encodeURIComponent(user);

}

//////////////////////////////////////////////////////
// Authentication
//////////////////////////////////////////////////////

async function manualLogin(){

    const username=
    document.getElementById(
    "auth-login-username"
    ).value.trim().toLowerCase();

    const password=
    document.getElementById(
    "auth-login-password"
    ).value;

    if(!username || !password){

        displaySystemToast(
        "أدخل البيانات"
        );

        return;

    }

    const doc=
    await db.collection("users")
    .doc(username)
    .get();

    if(!doc.exists){

        displaySystemToast(
        "المستخدم غير موجود"
        );

        return;

    }

    if(doc.data().password!==password){

        displaySystemToast(
        "كلمة المرور غير صحيحة"
        );

        return;

    }

    currentUser=username;

    localStorage.setItem(
    "logged_user",
    username
    );

    document.getElementById(
    "application-auth-overlay"
    ).style.display="none";

    performApplicationDataBootstrap();

}

async function manualRegister(e){

    e.preventDefault();

    const username=
    document.getElementById(
    "auth-reg-username"
    ).value.trim().toLowerCase();

    const email=
    document.getElementById(
    "auth-reg-email"
    ).value.trim();

    const password=
    document.getElementById(
    "auth-reg-password"
    ).value;

    if(!username||!email||!password)
    return;

    const check=
    await db.collection("users")
    .doc(username)
    .get();

    if(check.exists){

        displaySystemToast(
        "اسم المستخدم مستخدم"
        );

        return;

    }

    await db.collection("users")
    .doc(username)
    .set({

        username,

        email,

        password,

        avatar:
"https://img.icons8.com/fluency/96/user-male-circle.png",

        bio:""

    });

    currentUser=username;

    localStorage.setItem(
    "logged_user",
    username
    );

    document.getElementById(
    "application-auth-overlay"
    ).style.display="none";

    performApplicationDataBootstrap();

}

function logout(){

    localStorage.removeItem(
    "logged_user"
    );

    location.reload();

}
    //////////////////////////////////////////////////////
// Bootstrap Data
//////////////////////////////////////////////////////

async function performApplicationDataBootstrap() {

    try {

        // تحميل المستخدمين
        const usersSnapshot =
        await db.collection("users").get();

        globalUsersProfileMap = {};

        usersSnapshot.forEach(doc=>{
            const data = doc.data();
            globalUsersProfileMap[data.username] = data.avatar;
        });

        // تحميل المتابعة
        const followDoc =
        await db.collection("following")
        .doc(currentUser).get();

        globalFollowingCacheList =
        followDoc.exists ? (followDoc.data().list || []) : [];

        // تحميل أول بوستات
        await loadInitialPosts();

        // تحميل notes
        await synchronizeInlineNotesWithCloud();

    } catch(err){
        console.error(err);
    }
}

//////////////////////////////////////////////////////
// Notes
//////////////////////////////////////////////////////

async function synchronizeInlineNotesWithCloud(){

    const container =
    document.getElementById("notes-wall-mount-point");

    if(!container) return;

    container.innerHTML = "";

    const snap =
    await db.collection("notes").get();

    const notes = [];

    snap.forEach(doc=>{
        notes.push({id:doc.id,...doc.data()});
    });

    notes.sort((a,b)=>b.timestamp-a.timestamp);

    notes.forEach(note=>{

        const div = document.createElement("div");

        div.className="note-card";

        div.innerHTML=`
            <b>@${note.user}</b>
            <p>${note.text}</p>
        `;

        container.appendChild(div);

    });

}

//////////////////////////////////////////////////////
// Posts Feed Render (Basic Hook)
//////////////////////////////////////////////////////

function renderTimelinePostsFeed(posts){

    const container =
    document.getElementById("timeline-posts-feed-stream");

    container.innerHTML = "";

    posts.forEach(post=>{

        const div =
        document.createElement("div");

        div.className="feed-post-node-card";

        div.innerHTML=`
            <b>@${post.author}</b>
            <p>${post.content}</p>
        `;

        container.appendChild(div);

    });

}

//////////////////////////////////////////////////////
// Infinite Scroll System
//////////////////////////////////////////////////////

let lastVisiblePost = null;
let isLoadingMorePosts = false;
let allPostsLoaded = false;

async function loadInitialPosts(){

    const snap =
    await db.collection("posts")
    .orderBy("timestamp","desc")
    .limit(10)
    .get();

    globalPostsCache = [];

    snap.forEach(doc=>{
        globalPostsCache.push({
            id:doc.id,
            ...doc.data()
        });
    });

    renderTimelinePostsFeed(globalPostsCache);

    lastVisiblePost =
    snap.docs[snap.docs.length-1];

}

async function loadMorePosts(){

    if(!lastVisiblePost || isLoadingMorePosts || allPostsLoaded)
    return;

    isLoadingMorePosts = true;

    const snap =
    await db.collection("posts")
    .orderBy("timestamp","desc")
    .startAfter(lastVisiblePost)
    .limit(10)
    .get();

    if(snap.empty){
        allPostsLoaded = true;
        return;
    }

    snap.forEach(doc=>{
        globalPostsCache.push({
            id:doc.id,
            ...doc.data()
        });
    });

    lastVisiblePost =
    snap.docs[snap.docs.length-1];

    renderTimelinePostsFeed(globalPostsCache);

    isLoadingMorePosts = false;

}

//////////////////////////////////////////////////////
// Scroll Listener
//////////////////////////////////////////////////////

window.addEventListener("scroll", async ()=>{

    if(activeAppTabContext !== "home") return;

    const scrollPos =
    window.innerHeight + window.scrollY;

    const pageHeight =
    document.body.offsetHeight;

    if(scrollPos >= pageHeight - 200){

        await loadMorePosts();

    }

});

//////////////////////////////////////////////////////
// Search (Debounce)
//////////////////////////////////////////////////////

function debounce(func, delay){

    let timeout;

    return function(...args){

        clearTimeout(timeout);

        timeout = setTimeout(()=>{

            func.apply(this,args);

        },delay);

    }

}

function executeRealtimeContentSearchFilter(){

    const q =
    document.getElementById("app-content-search-field")
    .value.toLowerCase();

    const filtered =
    globalPostsCache.filter(p=>
        (p.content||"").toLowerCase().includes(q) ||
        (p.author||"").toLowerCase().includes(q)
    );

    renderTimelinePostsFeed(filtered);

}

document
.getElementById("app-content-search-field")
.addEventListener(
    "input",
    debounce(executeRealtimeContentSearchFilter,300)
);

//////////////////////////////////////////////////////
// Floating Button
//////////////////////////////////////////////////////

document
.getElementById("floating-create-post-btn")
.addEventListener("click", ()=>{

    const text = prompt("اكتب منشور:");

    if(!text) return;

    db.collection("posts").add({
        author: currentUser,
        content: text,
        timestamp: Date.now(),
        likedBy: [],
        comments: []
    }).then(loadInitialPosts);

});
        //////////////////////////////////////////////////////
// LIKE SYSTEM
//////////////////////////////////////////////////////

async function executeLikeTransaction(postId, currentLikes){

    let updatedLikes = [...(currentLikes || [])];

    if(updatedLikes.includes(currentUser)){
        updatedLikes = updatedLikes.filter(u=>u!==currentUser);
    }else{
        updatedLikes.push(currentUser);
    }

    await db.collection("posts").doc(postId)
    .update({ likedBy: updatedLikes });

    await loadInitialPosts();
}

//////////////////////////////////////////////////////
// FOLLOW SYSTEM
//////////////////////////////////////////////////////

async function executeFollowStateToggle(targetUser){

    if(!globalFollowingCacheList.includes(targetUser)){
        globalFollowingCacheList.push(targetUser);
    }else{
        globalFollowingCacheList =
        globalFollowingCacheList.filter(u=>u!==targetUser);
    }

    await db.collection("following")
    .doc(currentUser)
    .set({ list: globalFollowingCacheList });

}

//////////////////////////////////////////////////////
// COMMENTS SYSTEM
//////////////////////////////////////////////////////

async function addComment(postId, text){

    const postRef =
    db.collection("posts").doc(postId);

    const postSnap =
    await postRef.get();

    const postData = postSnap.data();

    const newComments = [
        ...(postData.comments || []),
        {
            user: currentUser,
            text,
            timestamp: Date.now()
        }
    ];

    await postRef.update({
        comments: newComments
    });

    await loadInitialPosts();
}

//////////////////////////////////////////////////////
// DELETE COMMENT
//////////////////////////////////////////////////////

async function deleteComment(postId, index){

    const postRef =
    db.collection("posts").doc(postId);

    const postSnap =
    await postRef.get();

    const postData = postSnap.data();

    const updated = postData.comments.filter((_,i)=>i!==index);

    await postRef.update({
        comments: updated
    });

    await loadInitialPosts();
}

//////////////////////////////////////////////////////
// MEDIA UPLOAD (IMAGE / VIDEO)
//////////////////////////////////////////////////////

async function uploadMedia(file){

    const ref =
    storage.ref().child(
        "posts/" + Date.now() + "_" + file.name
    );

    const snap = await ref.put(file);

    const url = await snap.ref.getDownloadURL();

    return url;
}

//////////////////////////////////////////////////////
// CREATE POST WITH MEDIA
//////////////////////////////////////////////////////

async function createPostWithMedia(text, file){

    let mediaUrl = null;
    let mediaType = null;

    if(file){

        mediaUrl = await uploadMedia(file);

        mediaType =
        file.type.startsWith("video")
        ? "video"
        : "image";

    }

    await db.collection("posts").add({
        author: currentUser,
        content: text,
        media: mediaUrl,
        mediaType: mediaType,
        timestamp: Date.now(),
        likedBy: [],
        comments: []
    });

    await loadInitialPosts();
}

function openMediaLightbox(url){

    const mount =

            //////////////////////////////////////////////////////
// REELS SYSTEM
//////////////////////////////////////////////////////

function renderIsolatedReelsStream(){

    const container =
    document.getElementById("reels-isolated-stream-mount");

    if(!container) return;

    container.innerHTML = "";

    const videos =
    globalPostsCache.filter(p=>p.mediaType==="video");

    if(videos.length===0){
        container.innerHTML =
        `<div style="text-align:center;padding:40px;color:#777">
            لا توجد فيديوهات
        </div>`;
        return;
    }

    videos.forEach(video=>{

        const div = document.createElement("div");
        div.className = "reel-card";

        div.innerHTML = `
            <video
                src="${video.media}"
                class="reel-video"
                loop
                muted
                playsinline
            ></video>

            <div class="reel-info">
                <b>@${video.author}</b>
                <p>${video.content || ""}</p>
            </div>
        `;

        container.appendChild(div);

    });

    enableReelsAutoPlay();
}

//////////////////////////////////////////////////////
// AUTO PLAY REELS (TikTok Effect)
//////////////////////////////////////////////////////

function enableReelsAutoPlay(){

    const videos =
    document.querySelectorAll(".reel-video");

    const observer =
    new IntersectionObserver(entries=>{

        entries.forEach(entry=>{

            const video = entry.target;

            if(entry.isIntersecting){
                video.play();
            }else{
                video.pause();
            }

        });

    },{ threshold: 0.7 });

    videos.forEach(v=>observer.observe(v));

}

//////////////////////////////////////////////////////
// REFRESH REELS WHEN TAB OPEN
//////////////////////////////////////////////////////

function openReelsTab(){

    activeAppTabContext = "reels";

    renderIsolatedReelsStream();

}

//////////////////////////////////////////////////////
// CLICK LIKE INSIDE REELS (optional hook)
//////////////////////////////////////////////////////

async function likeReel(postId, likes){

    let updated = [...(likes || [])];

    if(updated.includes(currentUser)){
        updated = updated.filter(u=>u!==currentUser);
    }else{
        updated.push(currentUser);
    }

    await db.collection("posts")
    .doc(postId)
    .update({ likedBy: updated });

    await synchronizePostsFeedWithCloud();

}
        //////////////////////////////////////////////////////
// COMMENTS BOTTOM SHEET
//////////////////////////////////////////////////////

let activeCommentPostId = null;

function openCommentsBottomSheetComponent(postId, comments){

    activeCommentPostId = postId;

    const sheet =
    document.getElementById("global-comments-sheet-container");

    const backdrop =
    document.getElementById("comments-modal-backdrop");

    const container =
    document.getElementById("comments-rendering-wall-mount");

    const title =
    document.getElementById("comments-panel-counter-title");

    sheet.classList.add("sheet-state-open");
    backdrop.classList.add("backdrop-state-visible");

    title.innerText = `التعليقات (${comments.length})`;

    container.innerHTML = "";

    if(!comments || comments.length === 0){
        container.innerHTML = `
            <div style="text-align:center;padding:20px;color:#777">
                لا توجد تعليقات
            </div>
        `;
    }

    comments.forEach((c,index)=>{

        const div = document.createElement("div");
        div.className = "comment-node";

        div.innerHTML = `
            <b>@${c.user}</b>
            <p>${c.text}</p>

            <button onclick="removeComment(${index})">
                حذف
            </button>
        `;

        container.appendChild(div);

    });

    const footer =
    document.getElementById("comments-action-footer-zone");

    footer.innerHTML = `
        <input id="comment-input" placeholder="اكتب تعليق...">
        <button onclick="submitComment()">
            إرسال
        </button>
    `;

}

//////////////////////////////////////////////////////
// CLOSE SHEET
//////////////////////////////////////////////////////

function closeGlobalCommentsBottomSheet(){

    document
    .getElementById("global-comments-sheet-container")
    .classList.remove("sheet-state-open");

    document
    .getElementById("comments-modal-backdrop")
    .classList.remove("backdrop-state-visible");

    activeCommentPostId = null;

}

//////////////////////////////////////////////////////
// ADD COMMENT
//////////////////////////////////////////////////////

async function submitComment(){

    const input =
    document.getElementById("comment-input");

    const text = input.value.trim();

    if(!text || !activeCommentPostId) return;

    const ref =
    db.collection("posts").doc(activeCommentPostId);

    const snap = await ref.get();

    const data = snap.data();

    const newComments = [
        ...(data.comments || []),
        {
            user: currentUser,
            text,
            timestamp: Date.now()
        }
    ];

    await ref.update({ comments: newComments });

    input.value = "";

    await synchronizePostsFeedWithCloud();

    openCommentsBottomSheetComponent(activeCommentPostId, newComments);

}

//////////////////////////////////////////////////////
// REMOVE COMMENT
//////////////////////////////////////////////////////

async function removeComment(index){

    if(!activeCommentPostId) return;

    const ref =
    db.collection("posts").doc(activeCommentPostId);

    const snap = await ref.get();

    const data = snap.data();

    const updated =
    data.comments.filter((_,i)=>i!==index);

    await ref.update({ comments: updated });

    await synchronizePostsFeedWithCloud();

    openCommentsBottomSheetComponent(activeCommentPostId, updated);

}

//////////////////////////////////////////////////////
// BACKDROP CLICK CLOSE
//////////////////////////////////////////////////////

document
.getElementById("comments-modal-backdrop")
.addEventListener("click", closeGlobalCommentsBottomSheet);

document
.getElementById("dismiss-comments-sheet-trigger")
.addEventListener("click", closeGlobalCommentsBottomSheet);

//////////////////////////////////////////////////////
// INIT HOOK (FINAL FIX)
//////////////////////////////////////////////////////

function initAppFixes(){

    if(currentUser){

        performApplicationDataBootstrap();

    }

}

initAppFixes();
}
