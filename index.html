<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Connect & Share</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <a href="#" class="app-logo">Friends</a>
        
        <div class="header-left">
            <button class="circle-btn" id="noti-btn">
                🔔
                <span class="badge">3</span>
            </button>
            <img src="https://via.placeholder.com/150" alt="User Profile" class="nav-avatar" id="nav-profile-img">
        </div>
    </header>

    <main class="app-container">
        
        <section class="search-section">
            <div class="search-bar-wrapper">
                <input type="text" id="search-input" placeholder="Search friends, posts, hashtags...">
                <div class="search-results-box" id="search-results" style="display: none;">
                    </div>
            </div>
        </section>

        <section class="notes-wrapper">
            <div class="add-note-inline">
                <input type="text" id="note-input" placeholder="Share a thought... (60 letters)">
                <button class="btn-primary" id="share-note-btn">Note</button>
            </div>
            <div class="notes-scroller" id="notes-container">
                <div class="note-bubble-item">
                    <div class="note-text-cloud">Listening to music..</div>
                    <img src="https://via.placeholder.com/150" alt="User" class="note-avatar">
                </div>
                </div>
        </section>

        <section class="create-post-box">
            <div class="post-input-row">
                <img src="https://via.placeholder.com/150" alt="My Avatar" class="user-avatar">
                <textarea id="post-textarea" placeholder="What's on your mind?"></textarea>
            </div>
            
            <div class="preview-zone" id="media-preview-box" style="display: none;">
                <button class="close-preview" id="cancel-media-btn">&times;</button>
                <img src="" id="preview-img-element" alt="Preview">
            </div>

            <div class="post-actions-row">
                <label for="media-upload" class="upload-label">
                    🖼️ Photo / Video
                    <input type="file" id="media-upload" accept="image/*,video/*" style="display: none;">
                </label>
                <button class="btn-primary" id="publish-post-btn">Publish</button>
            </div>
        </section>

        <section id="feed-timeline-container">
            
            <article class="feed-card">
                <div class="card-header">
                    <div class="card-user-info">
                        <img src="https://via.placeholder.com/150" alt="Author" class="user-avatar">
                        <div class="post-meta">
                            <h4>John Doe</h4>
                            <span>2 hours ago</span>
                        </div>
                    </div>
                    <button class="follow-btn-inline">Follow</button>
                </div>
                
                <div class="post-body-text">
                    This is a brand new design for our app! <a href="#" class="hashtag">#Friends2026</a>
                </div>
                
                <div class="post-media-attachment">
                    <img src="https://via.placeholder.com/600x400" alt="Post Media" class="lightbox-trigger">
                </div>

                <div class="card-actions-bar">
                    <button class="action-btn like-trigger">❤️ <span class="count">12</span></button>
                    <button class="action-btn comment-trigger">💬 <span>Comment</span></button>
                    <button class="action-btn save-trigger">🔖 <span>Save</span></button>
                </div>
            </article>

            <div class="shimmer-card" id="shimmer-loading-placeholder" style="display: none;">
                <div class="shimmer-line line-short"></div>
                <div class="shimmer-line line-long"></div>
                <div class="shimmer-line line-long"></div>
            </div>

        </section>
    </main>

    <div class="backdrop" id="comments-backdrop"></div>
    <div class="bottom-sheet" id="comments-sheet">
        <div class="sheet-header">
            <div class="drag-handle"></div>
            <span class="close-sheet" id="close-comments-btn">&times;</span>
            <h3>Comments</h3>
        </div>
        <div class="sheet-body" id="comments-list-body">
            <div class="comment-item">
                <img src="https://via.placeholder.com/150" alt="User" class="user-avatar" style="width:32px; height:32px;">
                <div class="comment-bubble">
                    <strong>Alex:</strong> Great feature layout!
                </div>
            </div>
        </div>
        <div class="sheet-footer">
            <input type="text" id="new-comment-input" placeholder="Write a comment...">
            <button class="btn-primary" id="send-comment-btn">Send</button>
        </div>
    </div>

    <div class="lightbox" id="global-lightbox" style="display: none;">
        <span class="close-lightbox" id="close-lightbox-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Full Scale Image">
    </div>

    <div class="toast" id="app-toast">
        <span class="toast-icon">✨</span>
        <span class="toast-text-message">Success Message Here</span>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-target="feed">
            <span>🏠</span>Home
        </a>
        <a href="#" class="nav-item" data-target="chats">
            <span>💬</span>Chats
        </a>
        <a href="#" class="nav-item" data-target="profile">
            <span>👤</span>Profile
        </a>
    </nav>

</body>
</html>
