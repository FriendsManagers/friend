<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في Friends لايف | تسجيل الدخول</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="animate-fade-in-up">

    <div id="app-toast" class="custom-toast">
        <div class="toast-icon-wrapper" style="background: var(--accent-light);">
            <span class="toast-icon">✨</span>
        </div>
        <div class="toast-message-text class-toast-msg">جاري فحص البيانات والاتصال بالفايربيز...</div>
    </div>

    <div class="login-wrapper">
        <div class="login-branding">
            <h1 class="platform-logo">Friends</h1>
            <p class="platform-slogan">منصة التواصل الأولى الحرة. وصول كامل 100% بدون خوارزميات حجب، ومتجر خدمات متكامل للحسابات الاحترافية بعمولة 0%.</p>
        </div>

        <div class="login-card hover-lift">
            <h2 class="card-title">مرحباً بك مجدداً</h2>
            <p class="card-subtitle">سجل دخولك الحين لتصفح التايملاين الزمني النظيف.</p>

            <form id="login-core-form" onsubmit="return false;">
                <div class="input-wrapper">
                    <label class="field-label">البريد الإلكتروني</label>
                    <input type="email" id="auth-email" class="base-input" required placeholder="fares@friends.com" style="direction: ltr; text-align: left;">
                </div>

                <div class="input-wrapper">
                    <label class="field-label">كلمة المرور</label>
                    <input type="password" id="auth-password" class="base-input" required placeholder="••••••••" style="direction: ltr; text-align: left;">
                </div>

                <button type="submit" id="auth-submit-btn" class="base-btn btn-accent btn-pulse" style="width: 100%; margin-top: 12px; height: 48px; border-radius: var(--radius-md);">
                    دخول للمنصة لايف
                </button>
            </form>

            <div class="auth-navigation-links">
                <p>ليس لديك حساب حتى الآن؟ <a href="register.html" class="highlight-link">إنشاء حساب جديد بجدارة</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
